<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Temperatura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 350px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Conversor de Temperatura</h1>

    <div class="campo">
      <label>Celsius (°C):</label>
      <input type="number" id="celsius" step="0.1" placeholder="Digite em Celsius" oninput="converterParaF()">
    </div>

    <div class="campo">
      <label>Fahrenheit (°F):</label>
      <input type="number" id="fahrenheit" step="0.1" placeholder="Digite em Fahrenheit" oninput="converterParaC()">
    </div>
  </div>

  <script>
    function converterParaF() {
      let celsius = document.getElementById("celsius").value;
      let fahrenheit = document.getElementById("fahrenheit");

      if (celsius === "") {
        fahrenheit.value = "";
        return;
      }

      let resultado = (celsius * 9 / 5) + 32;
      fahrenheit.value = resultado.toFixed(2);
    }

    function converterParaC() {
      let fahrenheit = document.getElementById("fahrenheit").value;
      let celsius = document.getElementById("celsius");

      if (fahrenheit === "") {
        celsius.value = "";
        return;
      }

      let resultado = (fahrenheit - 32) * 5 / 9;
      celsius.value = resultado.toFixed(2);
    }
  </script>
</body>
</html>
