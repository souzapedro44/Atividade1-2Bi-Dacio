<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Infinity Bank - Simulador</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 400px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    select, input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      margin-top: 10px;
    }

    #resultado {
      margin-top: 20px;
      padding: 15px;
      background-color: #f5f5f5;
      border: 1px solid #ccc;
      display: none;
    }

    #resultado p {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Infinity Bank - Simulador de Vendas</h1>

    <div class="campo">
      <label>Bandeira:</label>
      <select id="bandeira">
        <option value="visa">Visa (2%)</option>
        <option value="master">Master (1.85%)</option>
        <option value="elo">Elo (3%)</option>
      </select>
    </div>

    <div class="campo">
      <label>Valor da Venda (R$):</label>
      <input type="number" id="valor" placeholder="Ex: 500" step="0.01">
    </div>

    <div class="campo">
      <label>Número de Parcelas:</label>
      <input type="number" id="parcelas" placeholder="Ex: 3" min="1">
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado">
      <p><strong>Resumo da Venda:</strong></p>
      <p>Valor da Taxa: <span id="valorTaxa"></span></p>
      <p>Valor dos Juros: <span id="valorJuros"></span></p>
      <p>Taxa Mensal: <span id="taxaMensal"></span></p>
      <p>Valor Total: <span id="valorTotal"></span></p>
      <p>Valor de cada Parcela: <span id="valorParcela"></span></p>
    </div>
  </div>

  <script>
    function calcular() {
      let bandeira = document.getElementById("bandeira").value;
      let valor = parseFloat(document.getElementById("valor").value);
      let qtdParcelas = parseInt(document.getElementById("parcelas").value);

      if (!valor || !qtdParcelas) {
        alert("Preencha todos os campos!");
        return;
      }

      let taxaBandeira;
      switch (bandeira) {
        case "visa":
          taxaBandeira = 0.02;
          break;
        case "master":
          taxaBandeira = 0.0185;
          break;
        case "elo":
          taxaBandeira = 0.03;
          break;
      }

      let valorTaxa = valor * taxaBandeira;
      let juros = valor * (0.0035 * qtdParcelas);
      let taxaMensal = 12.50 * qtdParcelas;
      let total = valor + valorTaxa + juros + taxaMensal;
      let parcela = total / qtdParcelas;

      document.getElementById("valorTaxa").textContent = "R$ " + valorTaxa.toFixed(2);
      document.getElementById("valorJuros").textContent = "R$ " + juros.toFixed(2);
      document.getElementById("taxaMensal").textContent = "R$ " + taxaMensal.toFixed(2);
      document.getElementById("valorTotal").textContent = "R$ " + total.toFixed(2);
      document.getElementById("valorParcela").textContent = "R$ " + parcela.toFixed(2);

      document.getElementById("resultado").style.display = "block";
    }
  </script>
</body>
</html>
