<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Validador de CPF</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 350px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
    }

    #resultado {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Validador de CPF</h1>
    <input type="text" id="cpf" placeholder="Digite o CPF (ex: 123.456.789-09)" maxlength="14">
    <button onclick="validarCPF()">Validar</button>
    <p id="resultado"></p>
  </div>

  <script>
    function validarCPF() {
      // Remove tudo que não for número
      let cpf = document.getElementById("cpf").value.replace(/\D/g, "");
      let resultado = document.getElementById("resultado");

      // Verifica se tem 11 dígitos ou se todos são iguais
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
        resultado.textContent = "CPF Inválido";
        resultado.style.color = "red";
        return;
      }

      // Calcula o 1º dígito verificador
      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf[i]) * (10 - i);
      }
      let resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf[9])) {
        resultado.textContent = "CPF Inválido";
        resultado.style.color = "red";
        return;
      }

      // Calcula o 2º dígito verificador
      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf[i]) * (11 - i);
      }
      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf[10])) {
        resultado.textContent = "CPF Inválido";
        resultado.style.color = "red";
        return;
      }

      resultado.textContent = "CPF Válido";
      resultado.style.color = "green";
    }
  </script>
</body>
</html>
