<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crédito para Festas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 380px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    select, input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      margin-top: 10px;
    }

    #resultado {
      margin-top: 20px;
      padding: 15px;
      background-color: #f5f5f5;
      border: 1px solid #ccc;
      display: none;
    }

    #resultado p {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crédito para Festas & Eventos</h1>

    <div class="campo">
      <label>Pacote:</label>
      <select id="pacote">
        <option value="50">Standard - R$ 50,00 por pessoa</option>
        <option value="80">Premium - R$ 80,00 por pessoa</option>
        <option value="120">Infinity Deluxe - R$ 120,00 por pessoa</option>
      </select>
    </div>

    <div class="campo">
      <label>Quantidade de Pessoas:</label>
      <input type="number" id="pessoas" placeholder="Ex: 80" min="1">
    </div>

    <button onclick="calcularOrcamento()">Calcular Orçamento</button>

    <div id="resultado">
      <p><strong>Resumo do Orçamento:</strong></p>
      <p>Custo Bruto: <span id="custoBruto"></span></p>
      <p>Taxa de Serviço (10%): <span id="taxaServico"></span></p>
      <p id="linhaDesconto">Desconto Fidelidade (5%): <span id="desconto"></span></p>
      <p><strong>Total Final: <span id="totalFinal"></span></strong></p>
    </div>
  </div>

  <script>
    function calcularOrcamento() {
      let valorPacote = parseFloat(document.getElementById("pacote").value);
      let pessoas = parseInt(document.getElementById("pessoas").value);

      if (!pessoas || pessoas < 1) {
        alert("Informe a quantidade de pessoas!");
        return;
      }

      let custoBruto = valorPacote * pessoas;
      let taxaServico = custoBruto * 0.10;
      let subtotal = custoBruto + taxaServico;

      let desconto = 0;
      let linhaDesconto = document.getElementById("linhaDesconto");

      if (pessoas > 100) {
        desconto = subtotal * 0.05;
        linhaDesconto.style.display = "block";
      } else {
        linhaDesconto.style.display = "none";
      }

      let totalFinal = subtotal - desconto;

      document.getElementById("custoBruto").textContent = "R$ " + custoBruto.toFixed(2);
      document.getElementById("taxaServico").textContent = "R$ " + taxaServico.toFixed(2);
      document.getElementById("desconto").textContent = "R$ " + desconto.toFixed(2);
      document.getElementById("totalFinal").textContent = "R$ " + totalFinal.toFixed(2);

      document.getElementById("resultado").style.display = "block";
    }
  </script>
</body>
</html>
